<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer - Jorgelina Vernuccio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4A3A31;
            --accent: #B28B6A;
            --accent-hover: #987455;
            --bg-main: #FAFAFA;
            --bg-alt: #F2EFEA;
            --text-main: #333333;
            --text-muted: #666666;
            --white: #ffffff;
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .flyer {
            width: 1080px;
            height: 1080px;
            background-color: var(--bg-alt);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 80px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        /* Decorative Background Elements */
        .flyer::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(178, 139, 106, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .flyer::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: var(--primary);
            opacity: 0.03;
            border-radius: 50%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            padding-bottom: 5px;
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            color: var(--primary);
            margin: 40px 0 20px;
            line-height: 1.2;
            font-weight: 700;
        }

        .profession {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 5px;
        }

        .registration {
            font-size: 18px;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .services-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 60px;
            z-index: 1;
        }

        .service-item {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid rgba(178, 139, 106, 0.1);
        }

        .service-icon {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            background: var(--bg-alt);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .service-text {
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.3;
        }

        .footer {
            text-align: center;
            z-index: 1;
        }

        .cta-box {
            background: var(--primary);
            color: var(--white);
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            min-width: 600px;
            box-shadow: 0 15px 30px rgba(74, 58, 49, 0.3);
        }

        .cta-question {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 15px;
            font-style: italic;
        }

        .cta-phone {
            font-size: 54px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .website-url {
            margin-top: 20px;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        /* SVG Icons */
        .icon-svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <div class="flyer">
        <div class="header">
            <div class="brand-name">Jorgelina Vernuccio</div>
            <div class="tagline">Te ayudo a lograr tus objetivos</div>
            <div class="profession">Técnica en Psicología Social</div>
            <div class="registration">REGISTRO: 2465747</div>
        </div>

        <div class="services-container">
            <div class="service-item">
                <div class="service-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <div class="service-text">Desarrollo y Bienestar Laboral</div>
            </div>
            <div class="service-item">
                <div class="service-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v4"></path>
                        <path d="M12 16h.01"></path>
                    </svg>
                </div>
                <div class="service-text">Técnicas para reducir Estrés</div>
            </div>
            <div class="service-item">
                <div class="service-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </div>
                <div class="service-text">Conflictos Vinculares</div>
            </div>
            <div class="service-item">
                <div class="service-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <div class="service-text">Acompañamiento Vocacional</div>
            </div>
        </div>

        <div class="footer">
            <div class="cta-box">
                <div class="cta-question">¿Te cuento más información?</div>
                <div class="cta-phone">3412820079</div>
                <div class="website-url">jorgelinavernuccio.com.ar</div>
            </div>
        </div>
    </div>
</body>

</html>
